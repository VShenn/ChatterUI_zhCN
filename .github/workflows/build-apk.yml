name: Build Android APK (EAS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install project dependencies
        run: npm install

      - name: Install EAS CLI globally
        run: npm install -g eas-cli

      - name: Initialize EAS project (non-interactive)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # 生成一个随机的新项目ID
          PROJECT_ID=$(uuidgen | tr '[:upper:]' '[:lower:]')
          eas init --id $PROJECT_ID --force --non-interactive

      - name: Build Android APK (preview profile)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive
